{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Ink & Iron Tattoo & Piercing{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Give+You+Glory&family=Oswald:wght@400;500;600&family=Libre+Franklin:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <a href="{% url 'home' %}" class="shop-name">Ink &amp; Iron</a>
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'booking_request' %}" class="btn-stamp">Book Now</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; {% now "Y" %} Ink &amp; Iron Tattoo &amp; Piercing, Killarney</p>
    </footer>
</body>
</html>
