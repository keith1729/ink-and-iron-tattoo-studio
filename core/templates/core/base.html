{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Ink & Iron Tattoo Studio{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&family=Permanent+Marker&family=Pirata+One&display=swap" rel="stylesheet">

    <!-- Main site stylesheet -->
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

    <header class="site-header">
        <nav class="nav">
            <a href="{% url 'home' %}" class="shop-name">Ink & Iron</a>
            <ul class="nav-links">
                <li><a href="{% url 'tattoo_gallery' %}">Tattoos</a></li>
                <li><a href="{% url 'piercing_gallery' %}">Piercings</a></li>
                <li><a href="{% url 'artist_list' %}">Artists</a></li>
                <li><a href="{% url 'consultation' %}">Consultations</a></li>
                <li><a href="{% url 'booking_request' %}">Book</a></li>
            </ul>
        </nav>
    </header>

    <main class="site-main">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; {{ now|date:"Y" }} Ink & Iron Tattoo Studio — Killarney, Co. Kerry</p>
    </footer>

    <!-- Optional JS (only if you create it) -->
    {# <script src="{% static 'core/js/flash-cards.js' %}"></script> #}

</body>
</html>
